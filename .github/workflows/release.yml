name: Notify consumers

# Public, source-only package consumed directly via git deps:
#   FE:     "@easicloudaiot/i18n-domain": "github:easicloudaiot/i18n-domain#main"
#   Mobile: tool/sync_shared.dart pulls locales/*.json at a pinned SHA
#
# This workflow just fires a repository_dispatch at the consumers so each one
# can decide how to re-pull from main (open a bump PR, regenerate ARB,
# etc.). No npm registry publishing.

on:
  push:
    branches: [main]
    paths:
      - 'locales/**'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.EASIAIOT_BOT_APP_ID }}
          private-key: ${{ secrets.EASIAIOT_BOT_PRIVATE_KEY }}
          owner: easicloudaiot
          repositories: |
            EASIAioT-FE
            EASIAIoT-Mobile

      - name: Notify EASIAioT-FE
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA: ${{ github.sha }}
        run: |
          gh api repos/easicloudaiot/EASIAioT-FE/dispatches \
            -f event_type=i18n-updated \
            -F "client_payload[sha]=$SHA"

      - name: Notify EASIAIoT-Mobile
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA: ${{ github.sha }}
        run: |
          gh api repos/easicloudaiot/EASIAIoT-Mobile/dispatches \
            -f event_type=i18n-updated \
            -F "client_payload[sha]=$SHA"
